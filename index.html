<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/index.css">
  <title>KETO diet</title>
</head>
<body>
  <div class="cards-container">
    <div class="card">
      <div class="card-image">
        <img src="./src/icons/png/menu1.png" alt="imágen del menú de la semana numero 1"> 
      </div>
      <div class="card-info">
        <div class="card-title">
          <h1>Semana 1</h1>
        </div>
        <div class="card-description">
          <p>Menú de la semana número 1</p>
        </div>
      </div>
      <a href="#">
        <button class="open-btn">
          <p><span class="btn-text">Abrir</span><span class="material-icons">
            rocket_launch
            </span>
          </p>
        </button>
      </a>
    </div>

    <div class="card">
      <div class="card-image">
        <img src="./src/icons/png/menu2.png" alt="imágen del menú de la semana numero 1">
      </div>
      <div class="card-info">
        <div class="card-title">
          <h1>Semana 2</h1>
        </div>
        <div class="card-description">
          <p>Menú de la semana número 2</p>
        </div>
      </div>
      <a href="#">
        <button class="open-btn">
          <p><span class="btn-text">Abrir</span><span class="material-icons">
            rocket_launch
            </span>
          </p>
        </button>
      </a>
    </div>

    <div class="card">
      <div class="card-image">
        <img src="./src/icons/png/menu3.png" alt="imágen del menú de la semana numero 1">
      </div>
      <div class="card-info">
        <div class="card-title">
          <h1>Semana 3</h1>
        </div>
        <div class="card-description">
          <p>Menú de la semana número 3</p>
        </div>
      </div>
      <a href="#">
        <button class="open-btn">
          <p><span class="btn-text">Abrir</span><span class="material-icons">
            rocket_launch
            </span>
          </p>
        </button></a>
    </div>
  </div>

</body>
</html>
